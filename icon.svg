<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Basic Drop Shadow for the board -->
    <filter id="boardShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="15" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0f172a" rx="100"/>

  <!-- Center the isometric group -->
  <!-- scale(1.6, 0.9) stretches the board a bit for slightly exaggerated depth, then rotate 45 -->
  <g transform="translate(256, 150) scale(1.6, 0.8) rotate(45)">

    <!-- Board Frame Base / Shadow -->
    <rect x="-8" y="-8" width="176" height="176" fill="#1e293b" rx="4" filter="url(#boardShadow)"/>
    
    <!-- 3D Board Edge Highlights -->
    <!-- Lower edges -->
    <rect x="-6" y="-6" width="176" height="176" fill="#000000" rx="3"/>
    <rect x="-4" y="-4" width="168" height="168" fill="#cbd5e1" rx="2"/>

    <!-- The Checkerboard (4x4 view) -->
    <g id="board-cells">
      <!-- Row 0 -->
      <rect x="0" y="0" width="40" height="40" fill="#ffce9e"/>
      <rect x="40" y="0" width="40" height="40" fill="#387b54"/>
      <rect x="80" y="0" width="40" height="40" fill="#ffce9e"/>
      <rect x="120" y="0" width="40" height="40" fill="#387b54"/>
      <!-- Row 1 -->
      <rect x="0" y="40" width="40" height="40" fill="#387b54"/>
      <rect x="40" y="40" width="40" height="40" fill="#ffce9e"/>
      <rect x="80" y="40" width="40" height="40" fill="#387b54"/>
      <rect x="120" y="40" width="40" height="40" fill="#ffce9e"/>
      <!-- Row 2 -->
      <rect x="0" y="80" width="40" height="40" fill="#ffce9e"/>
      <rect x="40" y="80" width="40" height="40" fill="#387b54"/>
      <rect x="80" y="80" width="40" height="40" fill="#ffce9e"/>
      <rect x="120" y="80" width="40" height="40" fill="#387b54"/>
      <!-- Row 3 -->
      <rect x="0" y="120" width="40" height="40" fill="#387b54"/>
      <rect x="40" y="120" width="40" height="40" fill="#ffce9e"/>
      <rect x="80" y="120" width="40" height="40" fill="#387b54"/>
      <rect x="120" y="120" width="40" height="40" fill="#ffce9e"/>
    </g>

    <!-- 3D Pieces -->
    <!-- Red Player Pieces -->
    <g transform="translate(60, 20)">
       <circle cx="-1" cy="-1" r="16" fill="rgba(0,0,0,0.5)"/>
       <circle cx="-2" cy="-2" r="14" fill="#7f1d1d"/>
       <circle cx="-3" cy="-3" r="14" fill="#991b1b"/>
       <circle cx="-4" cy="-4" r="14" fill="#b91c1c"/>
       <circle cx="-5" cy="-5" r="14" fill="#ef4444"/>
       <circle cx="-5" cy="-5" r="8" fill="none" stroke="#fca5a5" stroke-width="2"/>
    </g>
    <g transform="translate(140, 20)">
       <circle cx="-1" cy="-1" r="16" fill="rgba(0,0,0,0.5)"/>
       <circle cx="-2" cy="-2" r="14" fill="#7f1d1d"/>
       <circle cx="-3" cy="-3" r="14" fill="#991b1b"/>
       <circle cx="-4" cy="-4" r="14" fill="#b91c1c"/>
       <circle cx="-5" cy="-5" r="14" fill="#ef4444"/>
       <circle cx="-5" cy="-5" r="8" fill="none" stroke="#fca5a5" stroke-width="2"/>
    </g>
    <g transform="translate(20, 60)">
       <circle cx="-1" cy="-1" r="16" fill="rgba(0,0,0,0.5)"/>
       <circle cx="-2" cy="-2" r="14" fill="#7f1d1d"/>
       <circle cx="-3" cy="-3" r="14" fill="#991b1b"/>
       <circle cx="-4" cy="-4" r="14" fill="#b91c1c"/>
       <circle cx="-5" cy="-5" r="14" fill="#ef4444"/>
       <circle cx="-5" cy="-5" r="8" fill="none" stroke="#fca5a5" stroke-width="2"/>
    </g>

    <!-- Blue Player Pieces -->
    <g transform="translate(20, 140)">
       <circle cx="-1" cy="-1" r="16" fill="rgba(0,0,0,0.5)"/>
       <circle cx="-2" cy="-2" r="14" fill="#002d4a"/>
       <circle cx="-3" cy="-3" r="14" fill="#026eab"/>
       <circle cx="-4" cy="-4" r="14" fill="#0284c7"/>
       <circle cx="-5" cy="-5" r="14" fill="#38bdf8"/>
       <circle cx="-5" cy="-5" r="8" fill="none" stroke="#7dd3fc" stroke-width="2"/>
    </g>
    <g transform="translate(100, 140)">
       <circle cx="-1" cy="-1" r="16" fill="rgba(0,0,0,0.5)"/>
       <circle cx="-2" cy="-2" r="14" fill="#002d4a"/>
       <circle cx="-3" cy="-3" r="14" fill="#026eab"/>
       <circle cx="-4" cy="-4" r="14" fill="#0284c7"/>
       <circle cx="-5" cy="-5" r="14" fill="#38bdf8"/>
       <circle cx="-5" cy="-5" r="8" fill="none" stroke="#7dd3fc" stroke-width="2"/>
    </g>
    <g transform="translate(140, 100)">
       <circle cx="-1" cy="-1" r="16" fill="rgba(0,0,0,0.5)"/>
       <circle cx="-2" cy="-2" r="14" fill="#002d4a"/>
       <circle cx="-3" cy="-3" r="14" fill="#026eab"/>
       <circle cx="-4" cy="-4" r="14" fill="#0284c7"/>
       <circle cx="-5" cy="-5" r="14" fill="#38bdf8"/>
       <circle cx="-5" cy="-5" r="8" fill="none" stroke="#7dd3fc" stroke-width="2"/>
    </g>

  </g>
</svg>
