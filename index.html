<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Checkers</title>
    <meta name="description" content="A beautiful, interactive web-based Checkers game.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Checkers</h1>
            <div class="status-panel">
                <div class="player-status active" id="player1-status">
                    <div class="avatar p1-color"></div>
                    <span>Player 1</span>
                    <span class="score" id="p1-score">20</span>
                </div>
                <div class="turn-indicator" id="turn-indicator">Player 1's Turn</div>
                <div class="player-status" id="player2-status">
                    <span class="score" id="p2-score">20</span>
                    <span>Player 2</span>
                    <div class="avatar p2-color"></div>
                </div>
            </div>
            <div class="controls-panel">
                <div class="lock-wrapper">
                    <button class="btn" id="lock-btn">Lock Game</button>
                    <span id="lock-time" class="lock-time hidden"></span>
                </div>
                <button class="btn" id="restart-btn">Restart Game</button>
            </div>
        </header>

        <main class="board-container">
            <div class="board" id="board">
                <!-- Squares will be generated by JS -->
            </div>
        </main>
        
        <div class="message-overlay hidden" id="message-overlay">
            <div class="message-box">
                <h2 id="winner-text">Player 1 Wins!</h2>
                <button class="btn primary" id="play-again-btn">Play Again</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
